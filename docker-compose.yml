x-service-build: &java-service-build
  context: .
  dockerfile: docker/Dockerfile.java-service

x-common-service-env: &common-service-env
  SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
  EUREKA_CLIENT_DEFAULT_ZONE: http://eureka-server-1:8761/eureka/,http://eureka-server-2:8762/eureka/

x-default-healthcheck: &default-healthcheck
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 30s

services:
  config-server:
    build:
      <<: *java-service-build
      args:
        SERVICE_DIR: config-server
    environment:
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/workspace/config-repo
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
    volumes:
      - ./config-repo:/workspace/config-repo:ro
    ports:
      - "8888:8888"
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health >/dev/null || exit 1"]

  eureka-server-1:
    build:
      <<: *java-service-build
      args:
        SERVICE_DIR: eureka-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_PORT: 8761
      EUREKA_HOSTNAME: eureka-server-1
      EUREKA_PEERS: http://eureka-server-2:8762/eureka/
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health >/dev/null || exit 1"]

  eureka-server-2:
    build:
      <<: *java-service-build
      args:
        SERVICE_DIR: eureka-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_PORT: 8762
      EUREKA_HOSTNAME: eureka-server-2
      EUREKA_PEERS: http://eureka-server-1:8761/eureka/
    ports:
      - "8762:8762"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8762/actuator/health >/dev/null || exit 1"]

  support-rules-mcp-server:
    build:
      <<: *java-service-build
      args:
        SERVICE_DIR: support-rules-mcp-server
    environment:
      <<: *common-service-env
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health >/dev/null || exit 1"]

  ai-support-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai-support-service
    environment:
      <<: *common-service-env
      SMARTDESK_AI_MODE: ${SMARTDESK_AI_MODE:-fake}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SMARTDESK_RAG_DOCS_PATH: /workspace/rag-docs
      SMARTDESK_SERVICES_SUPPORT_RULES_MCP_BASE_URL: http://support-rules-mcp-server:8084
      SMARTDESK_EXTERNAL_MCP_FILESYSTEM_DOCS_PATH: /workspace/external-mcp-docs
      SMARTDESK_EXTERNAL_MCP_FILESYSTEM_COMMAND: npx
    volumes:
      - ./rag-docs:/workspace/rag-docs:ro
      - ./external-mcp-docs:/workspace/external-mcp-docs:ro
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      support-rules-mcp-server:
        condition: service_healthy
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health >/dev/null || exit 1"]

  sla-function-service:
    build:
      <<: *java-service-build
      args:
        SERVICE_DIR: sla-function-service
    environment:
      <<: *common-service-env
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health >/dev/null || exit 1"]

  ticket-orchestrator-service:
    build:
      <<: *java-service-build
      args:
        SERVICE_DIR: ticket-orchestrator-service
    environment:
      <<: *common-service-env
      SMARTDESK_CONFIG_SERVER_URL: http://config-server:8888
      SMARTDESK_SERVICES_AI_SUPPORT_BASE_URL: http://ai-support-service:8082
      SMARTDESK_SERVICES_SLA_FUNCTION_BASE_URL: http://sla-function-service:8083
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      ai-support-service:
        condition: service_healthy
      sla-function-service:
        condition: service_healthy
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health >/dev/null || exit 1"]

  gateway-service:
    build:
      <<: *java-service-build
      args:
        SERVICE_DIR: gateway-service
    environment:
      <<: *common-service-env
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server-1:
        condition: service_healthy
      eureka-server-2:
        condition: service_healthy
      ticket-orchestrator-service:
        condition: service_healthy
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]

  prometheus:
    image: prom/prometheus:v3.0.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus-docker.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      config-server:
        condition: service_healthy
      gateway-service:
        condition: service_healthy
      ticket-orchestrator-service:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
