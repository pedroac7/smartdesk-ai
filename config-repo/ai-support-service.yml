server:
  port: 8082

spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

smartdesk:
  ai:
    mode: ${SMARTDESK_AI_MODE:fake}
    openai:
      model: ${SMARTDESK_AI_OPENAI_MODEL:gpt-4o-mini}
  rag:
    docs-path: ${SMARTDESK_RAG_DOCS_PATH:../rag-docs}
  services:
    support-rules-mcp:
      base-url: ${SMARTDESK_SERVICES_SUPPORT_RULES_MCP_BASE_URL:http://localhost:8084}
  external-mcp:
    filesystem:
      enabled: ${SMARTDESK_EXTERNAL_MCP_FILESYSTEM_ENABLED:true}
      command: ${SMARTDESK_EXTERNAL_MCP_FILESYSTEM_COMMAND:npx}
      package-name: ${SMARTDESK_EXTERNAL_MCP_FILESYSTEM_PACKAGE_NAME:@modelcontextprotocol/server-filesystem}
      docs-path: ${SMARTDESK_EXTERNAL_MCP_FILESYSTEM_DOCS_PATH:../external-mcp-docs}
      timeout: ${SMARTDESK_EXTERNAL_MCP_FILESYSTEM_TIMEOUT:5s}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
