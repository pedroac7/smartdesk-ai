server:
  port: 8081

smartdesk:
  config-server:
    url: http://localhost:8888
  fallback:
    category: "SUPORTE_GERAL"
    priority: "MEDIA"
    summary: "Análise automática indisponível no momento."
    suggested-answer: "Seu chamado foi registrado e será analisado por um atendente."
    sla-hours: 24
    support-team: "Triagem Manual"
  services:
    ai-support:
      base-url: http://localhost:8082
    sla-function:
      base-url: http://localhost:8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,refresh
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      aiSupportService:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
  retry:
    instances:
      aiSupportService:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      aiSupportService:
        timeoutDuration: 3s
  bulkhead:
    instances:
      aiSupportService:
        maxConcurrentCalls: 5
        maxWaitDuration: 0
