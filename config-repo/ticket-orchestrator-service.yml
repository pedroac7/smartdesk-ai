server:
  port: 8081

smartdesk:
  config-server:
    url: ${SMARTDESK_CONFIG_SERVER_URL:http://localhost:8888}
  fallback:
    category: "SUPORTE_GERAL"
    priority: "MEDIA"
    summary: "AnÃ¡lise automÃ¡tica indisponÃ­vel no momento."
    suggested-answer: "Seu chamado foi registrado e serÃ¡ analisado por um atendente."
    sla-hours: 12
    support-team: "Equipe de ContingÃªncia"
  services:
    ai-support:
      base-url: ${SMARTDESK_SERVICES_AI_SUPPORT_BASE_URL:http://localhost:8082}
    sla-function:
      base-url: ${SMARTDESK_SERVICES_SLA_FUNCTION_BASE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,refresh
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      aiSupportService:
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
  retry:
    instances:
      aiSupportService:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      aiSupportService:
        timeoutDuration: 15s
  bulkhead:
    instances:
      aiSupportService:
        maxConcurrentCalls: 5
        maxWaitDuration: 0
