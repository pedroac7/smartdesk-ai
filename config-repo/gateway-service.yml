server:
  port: 8080

management:
  health:
    redis:
      enabled: false

smartdesk:
  gateway:
    rate-limit:
      enabled: true
      capacity: 10
      refill-period: 10s
      path: /api/tickets/analyze

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ticket-orchestrator-status
              uri: lb://ticket-orchestrator-service
              predicates:
                - Path=/api/tickets/**
              filters:
                - StripPrefix=1
                - Retry=3
