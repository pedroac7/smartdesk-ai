global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["config-server:8888"]

  - job_name: eureka-server-1
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka-server-1:8761"]

  - job_name: eureka-server-2
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka-server-2:8762"]

  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway-service:8080"]

  - job_name: ticket-orchestrator-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ticket-orchestrator-service:8081"]

  - job_name: ai-support-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ai-support-service:8082"]

  - job_name: sla-function-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["sla-function-service:8083"]

  - job_name: support-rules-mcp-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["support-rules-mcp-server:8084"]
